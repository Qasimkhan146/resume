<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Project preview placeholder</title>
  <desc id="desc">Gradient placeholder image used for project cards when final screenshots are not available.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1d4ed8" />
      <stop offset="100%" stop-color="#0ea5e9" />
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)" rx="24" />
  <g fill="#e2e8f0" font-family="Inter, Arial, sans-serif">
    <text x="80" y="318" font-size="56" font-weight="700">Project Preview</text>
    <text x="80" y="374" font-size="28" opacity="0.9">Screenshot will be added here</text>
  </g>
</svg>
